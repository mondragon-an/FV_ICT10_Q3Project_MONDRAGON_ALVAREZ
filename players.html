<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICT PROJECT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css"/>
  <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Nunito;
      background: #f0ece4;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav span {
      color: #e0d5c5;
      font-size: 14px;
      letter-spacing: 1px;
    }

    nav a {
      color: #e0d5c5;
      text-decoration: none;
      margin-left: 16px;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #e0d5c5;
      border-radius: 3px;
    }

    nav a:hover, nav a.active {
      background: #e0d5c5;
      color: #1a1a2e;
    }

    .page {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: calc(100vh - 50px);
      padding: 60px 20px;
    }

    .card {
      background: white;
      border: 1px solid #ccc;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 4px 4px 0px #1a1a2e;
      text-align: center;
    }

    h2 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: 1px;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: Nunito;
      margin-bottom: 24px;
    }

    button:hover { background: #2e2e50; }

    #player-list p {
      font-size: 14px;
      color: #333;
      padding: 6px 0;
      border-bottom: 1px solid #f0ece4;
    }

    #player-list p:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

  <nav>
    <span>Intramurals SY 2025-2026</span>
    <div>
      <a href="index.html">Sign Up</a>
      <a href="teamchecker.html">Team Checker</a>
      <a href="players.html" class="active">Players</a>
    </div>
  </nav>

  <div class="page">
    <div class="card">
      <h2>Intramurals Players</h2>
      <button py-click="show_players">SHOW PLAYERS</button>
      <div id="player-list"></div>
    </div>
  </div>

  <script type="py" src="main.py"></script>

</body>
</html>
