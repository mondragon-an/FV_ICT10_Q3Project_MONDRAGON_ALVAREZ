<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Checker - Intramurals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #f0ece4;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav span {
      color: #e0d5c5;
      font-size: 14px;
      letter-spacing: 1px;
    }

    nav a {
      color: #e0d5c5;
      text-decoration: none;
      margin-left: 16px;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #e0d5c5;
      border-radius: 3px;
    }

    nav a:hover, nav a.active {
      background: #e0d5c5;
      color: #1a1a2e;
    }

    .page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 50px);
      padding: 40px 20px;
    }

    .card {
      background: white;
      border: 1px solid #ccc;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 4px 4px 0px #1a1a2e;
    }

    h2 {
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 24px;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 10px;
      letter-spacing: 1px;
    }

    .question {
      margin-bottom: 18px;
    }

    .question p {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
    }

    .question label {
      font-size: 14px;
      margin-right: 16px;
      color: #444;
    }

    select {
      width: 100%;
      padding: 9px;
      margin-top: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      font-family: Georgia, serif;
      background: white;
      outline: none;
    }

    select:focus { border-color: #1a1a2e; }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: Georgia, serif;
    }

    button:hover { background: #2e2e50; }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 15px;
      color: #1a1a2e;
      min-height: 24px;
    }
  </style>
</head>
<body>

  <nav>
    <span>Intramurals SY 2025-2026</span>
    <div>
      <a href="index.html">Sign Up</a>
      <a href="teamchecker.html" class="active">Team Checker</a>
      <a href="players.html">Players</a>
    </div>
  </nav>

  <div class="page">
    
        <h2>Intrams Team Checker </h2>
        <form id="form">
            <label>registered online?</label>
            <input type="radio" name="registration" id="registration" value="registered" required> yes
            <input type="radio" name="registration" value="no"> no
            <br>
            <label>do you have medical clearance?</label>
            <input type="radio" name="medical" id="medicalyes" value="yes" required> yes
            <input type="radio" name="medical" id="medicalno" value="no"> no
            <br>
            <label>what is your grade level and section?</label>
            <select name="grade" required>
                <option value="0">select grade</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
            <select name="section" required>
                <option value="0">select section</option>
                <option value="1">emerald</option>
                <option value="2">ruby</option>
                <option value="3">sapphire</option>
                <option value="4">topaz</option>
                <option value="5">jade</option>
            </select>
            <br><br>
            <button type="submit" py-click="intrams_check">continue</button>
        </form>  
        <div id="result1"></div>
    </div>

    <script type="py" src="main.py"></script>

      <button oncl="checkTeam">SIGN UP</button>

      <p id="result"></p>
    </div>
  </div>


</body>

</html>
