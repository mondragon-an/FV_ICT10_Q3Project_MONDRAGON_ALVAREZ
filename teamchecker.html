<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICT PROJECT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css"/>
  <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Nunito;
      background: #f0ece4;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav span {
      color: #e0d5c5;
      font-size: 14px;
      letter-spacing: 1px;
    }

    nav a {
      color: #e0d5c5;
      text-decoration: none;
      margin-left: 16px;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #e0d5c5;
      border-radius: 3px;
    }

    nav a:hover, nav a.active {
      background: #e0d5c5;
      color: #1a1a2e;
    }

    .page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 50px);
      padding: 40px 20px;
    }

    .card {
      background: white;
      border: 1px solid #ccc;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 4px 4px 0px #1a1a2e;
    }

    h2 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: 1px;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 5px;
      margin-top: 16px;
      text-transform: uppercase;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      letter-spacing: 0;
      text-transform: none;
      color: #333;
      margin: 0;
      cursor: pointer;
    }

    input[type="radio"] {
      width: auto;
      accent-color: #1a1a2e;
      cursor: pointer;
    }

    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      font-family: Nunito;
      background: white;
      outline: none;
    }

    select:focus { border-color: #1a1a2e; }

    .selects-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: Nunito;
    }

    button:hover { background: #2e2e50; }

    #result1 {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: #1a1a2e;
    }

    #result1.error { color: #c0392b; }
    #result1.success { color: #1a5e3a; }
  </style>
</head>
<body>

  <nav>
    <span>Intramurals SY 2025-2026</span>
    <div>
      <a href="index.html">Sign Up</a>
      <a href="teamchecker.html" class="active">Team Checker</a>
      <a href="players.html">Players</a>
    </div>
  </nav>

  <div class="page">
    <div class="card">
      <h2>Intrams Team Checker</h2>

      <form id="form">
        <label>Registered online?</label>
        <div class="radio-group">
          <label><input type="radio" name="registration" value="yes" required> Yes</label>
          <label><input type="radio" name="registration" value="no"> No</label>
        </div>

        <label>Do you have medical clearance?</label>
        <div class="radio-group">
          <label><input type="radio" name="medical" value="yes" required> Yes</label>
          <label><input type="radio" name="medical" value="no"> No</label>
        </div>

        <label>Grade Level &amp; Section</label>
        <div class="selects-row">
          <select name="grade" required>
            <option value="0">Select grade</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
          <select name="section" required>
            <option value="0">Select section</option>
            <option value="1">Emerald</option>
            <option value="2">Ruby</option>
            <option value="3">Sapphire</option>
            <option value="4">Topaz</option>
            <option value="5">Jade</option>
          </select>
        </div>

        <button type="submit" py-click="intrams_check">CONTINUE</button>
      </form>

      <div id="result1"></div>
    </div>
  </div>

  <script type="py" src="main.py"></script>

</body>
</html>

</body>

</html>
